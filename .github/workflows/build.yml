name: Build

on:
  push:
    branches: [ feature/sdcc-port ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDCC
        run: sudo apt-get update && sudo apt-get install -y sdcc python3

      - name: Build
        run: make